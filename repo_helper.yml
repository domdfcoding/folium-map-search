# Configuration for 'repo_helper' (https://github.com/repo-helper/repo_helper)
---
modname: 'folium-map-search'
copyright_years: '2026'
author: 'Dominic Davis-Foster'
email: 'dominic@davis-foster.co.uk'
username: 'domdfcoding'
version: '0.1.0b5'
license: 'MIT'
short_desc: 'Adds a control to search for major places on the map and for map markers.'

enable_conda: false
enable_tests: false
enable_docs: false
use_whey: true
on_pypi: false

python_versions:
 - "3.9"
 - "3.10"
 - "3.11"
 - "3.12"
 - "3.13"

additional_ignore:
 - node_modules

manifest_additional:
  - include folium_map_search/folium-map-search.js
  - include folium_map_search/folium-map-search.js.map

exclude_files:
  - justfile

extra_formate_deps:
 - formate-js>=0.1.0

extra_formate_types:
 - ts
